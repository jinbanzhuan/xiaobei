name: pytest

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许在 Actions 页面手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest pytest-html pytest-sugar allure-pytest pyjwt pyyaml

      - name: 生成 .env.local
        env:
          XIAOBEI_JWT_SIGNING_SECRET: ${{ secrets.XIAOBEI_JWT_SIGNING_SECRET }}
          XIAOBEI_USER_ID:            ${{ secrets.XIAOBEI_USER_ID }}
          XIAOBEI_TENANT_ID:          ${{ secrets.XIAOBEI_TENANT_ID }}
          XIAOBEI_USERNAME:           ${{ secrets.XIAOBEI_USERNAME }}
          EXP_NORTH_APP_BASE_URL:      ${{ secrets.EXP_NORTH_APP_BASE_URL }}
          EXP_NORTH_APP_CLIENT_ID:     ${{ secrets.EXP_NORTH_APP_CLIENT_ID }}
          EXP_NORTH_APP_CLIENT_SECRET: ${{ secrets.EXP_NORTH_APP_CLIENT_SECRET }}
          EXP_NORTH_APP_WORKSPACE_ID:  ${{ secrets.EXP_NORTH_APP_WORKSPACE_ID }}
          EXP_NORTH_APP_AGENT_USER_ID: ${{ secrets.EXP_NORTH_APP_AGENT_USER_ID }}
        run: |
          {
            echo "XIAOBEI_JWT_SIGNING_SECRET=$XIAOBEI_JWT_SIGNING_SECRET"
            echo "XIAOBEI_USER_ID=$XIAOBEI_USER_ID"
            echo "XIAOBEI_TENANT_ID=$XIAOBEI_TENANT_ID"
            echo "XIAOBEI_USERNAME=$XIAOBEI_USERNAME"
            echo "EXP_NORTH_APP_BASE_URL=$EXP_NORTH_APP_BASE_URL"
            echo "EXP_NORTH_APP_CLIENT_ID=$EXP_NORTH_APP_CLIENT_ID"
            echo "EXP_NORTH_APP_CLIENT_SECRET=$EXP_NORTH_APP_CLIENT_SECRET"
            echo "EXP_NORTH_APP_WORKSPACE_ID=$EXP_NORTH_APP_WORKSPACE_ID"
            echo "EXP_NORTH_APP_AGENT_USER_ID=$EXP_NORTH_APP_AGENT_USER_ID"
          } > .env.local
          echo "✅ .env.local 已生成 ($(wc -l < .env.local) 行)"

      - name: 跑 pytest
        run: |
          pytest testcases/test_visits/ -v --tb=short

      - name: 上传 allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
