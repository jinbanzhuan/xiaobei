name: pytest

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许在 Actions 页面手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 所有敏感配置直接注入进程环境, config.get_env_value 优先读系统环境变量, 无需 .env.local
    env:
      XIAOBEI_JWT_SIGNING_SECRET: ${{ secrets.XIAOBEI_JWT_SIGNING_SECRET }}
      XIAOBEI_USER_ID:            ${{ secrets.XIAOBEI_USER_ID }}
      XIAOBEI_TENANT_ID:          ${{ secrets.XIAOBEI_TENANT_ID }}
      XIAOBEI_USERNAME:           ${{ secrets.XIAOBEI_USERNAME }}
      DEV_NORTH_APP_BASE_URL:      ${{ secrets.DEV_NORTH_APP_BASE_URL }}
      DEV_NORTH_APP_CLIENT_ID:     ${{ secrets.DEV_NORTH_APP_CLIENT_ID }}
      DEV_NORTH_APP_CLIENT_SECRET: ${{ secrets.DEV_NORTH_APP_CLIENT_SECRET }}
      DEV_NORTH_APP_WORKSPACE_ID:  ${{ secrets.DEV_NORTH_APP_WORKSPACE_ID }}
      DEV_NORTH_APP_AGENT_USER_ID: ${{ secrets.DEV_NORTH_APP_AGENT_USER_ID }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest pytest-html pytest-sugar pyjwt pyyaml

      - name: 跑 pytest
        run: pytest testcases/test_visits/ -v --tb=short
